        /* 🌙 Banner */
        .banner {

        }

        /* 🎯 Container */
        .container {
            margin-top: 40px;
            animation: slideUp 1.5s ease;
        }

        input {
            padding: 14px;
            width: 260px;
            border-radius: 10px;
            border: 2px solid #1ce777;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #132426;
            box-shadow: 0 0 10px #1ce777;
        }

        button {
            padding: 14px 30px;
            border: none;
            background: #132426;
            color: white;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover {
            background: #1ce777;
            color: #132426;
        }

        /* Card */
        .card {
            margin: 40px auto;
            padding: 30px;
            width: 320px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
            animation: popUp 0.8s ease;
        }

        /* Floating */
        .emoji {
            position: fixed;
            font-size: 20px;
            animation: float 6s linear infinite;
        }

        /* Animations */
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideUp {
            from {transform: translateY(50px); opacity:0;}
            to {transform: translateY(0); opacity:1;}
        }

        @keyframes popUp {
            from {transform: scale(0.5); opacity:0;}
            to {transform: scale(1); opacity:1;}
        }

        @keyframes float {
            from {transform: translateY(100vh);}
            to {transform: translateY(-10vh);}
        }

function showMessage() {
    var nameInput = document.getElementById("nameInput").value.toLowerCase();

    // Default: not found
    var messageFound = null;

    // Check all keys in people
    for (var key in people) {
        if (nameInput.includes(key)) {
            messageFound = people[key].message;
            break; // Stop at the first match
        }
    }

    if (messageFound) {
        document.getElementById("msg").innerHTML = messageFound;
        document.getElementById("greet").style.display = "none";
        document.getElementById("eidi").style.display = "none";
        document.getElementById("card").style.display = "block";
    } else {
        alert("Name not found 😅");
    }
}
